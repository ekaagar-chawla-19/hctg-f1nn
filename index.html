<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width = device-width, inital-scale = 1.0">
    <title>F1 Race Predictor Neural Network.</title>
    <link href =" https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel = "stylesheet">
    </meta>
    <style>
        :root {
            --red: #e8002d;
            --red-dim: #8a0019;
            --gold: #ffd700;
            --white: #f0ede8;
            --off: #a09a92;
            --bg: #080706;
            --panel: #0f0e0c;
            --border: #1e1c19;
            --glow: rgba(232,0,45,0.15);
        }

        *, *::before, *::after {box-sizing:border-box; margin: 0; padding: 0;}
        html { scroll-behavior: smooth}

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Barlow', sans-serif;
            font-weight: 300;
            overflow-x: hidden;
            cursor: none;
        }

        .cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--red);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease, width 0.2s, height 0.2s;
            mix-blend-mode: difference
        }
        .cursor-ring {
            position: fixed;
            width: 32px;
            height: 32px;
            border: 1px solid green;
            border-radius: 53%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: trasnform 0.18s ease, width 0.2s, height 0.2s, border-color 0.2;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9990;
            opacity: 0.4;
        }
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 49px; 
            border-bottom: 1px solid var (--border);
            background: rgba(8,7,6,0.85);
            backdrop-filter: blur(12px);
        }
        .nav-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 4px;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-logo span {
            color: var(--red);
        }
        .nav-dot {
            width: 8px;
            height: 8px;
            background: var(--red);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% 
            { 
                opacity: 1; transform: scale(1);
            }
            50% {
                opacity: 0.4; transform: scale(0.7);
            }
        }
        .nav-links {
            display: flex;
            gap: 36px;
            list-style: none;
        }   
        .nav-links a {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--off);
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: var(--white);
        }
        
    </style>
</head>

</html>
